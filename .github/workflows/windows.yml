# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Windows build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2
        with:
          submodules: 'recursive'
          
      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v2.0.2

      - name: Setup Vulkan SDK
        uses: humbletim/setup-vulkan-sdk@v1.2.1
        with:
          vulkan-query-version: latest
          vulkan-components: Vulkan-Headers, Vulkan-Loader
          vulkan-use-cache: true
        
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake mingw-w64-x86_64-ninja

      - name: Build
        shell: msys2 {0}
        run: |
          cmake -S . -B build -G "Ninja" \
          -DDOXYGEN_EXECUTABLE=OFF \
          -DPTHREAD_VERSION_STR="2.10.0" \
          -DPTHREAD_VERSION_MAJOR=2 \
          -DPTHREAD_VERSION_MINOR=10 \
          -DPTHREAD_VERSION_PATCH=0          
          cmake --build build

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          name: ChonkyStation4 
          path: ./build/Release/ChonkyStation4.exe
